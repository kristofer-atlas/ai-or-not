name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck automation scripts
        run: >
          bunx tsc --noEmit --skipLibCheck --target es2022 --module esnext
          --moduleResolution bundler
          scripts/generate-openrouter-images.ts
          scripts/daily-dataset-pipeline.ts
          scripts/serve-local-gallery.ts

      - name: Pipeline dry-run smoke test
        run: bun run scripts/daily-dataset-pipeline.ts --dry-run --daily-count=0
